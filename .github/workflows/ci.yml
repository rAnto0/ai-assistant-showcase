name: CI

permissions:
  contents: read

on:
  push:
    paths:
      - backend/**
      - .github/workflows/**
      - docker-compose*.yml
      - Makefile
      - .env.example
      - scripts/**
  pull_request:
    paths:
      - backend/**
      - .github/workflows/**
      - docker-compose*.yml
      - Makefile
      - .env.example
      - scripts/**

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge-conflict-check:
      name: Merge Conflict Check
      if: github.event_name == 'pull_request'
      runs-on: ubuntu-latest

      steps:
        - name: Checkout PR head
          uses: actions/checkout@v4
          with:
            ref: ${{ github.event.pull_request.head.sha }}
            fetch-depth: 0

        - name: Verify merge with base branch
          run: |
            git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"
            git merge --no-commit --no-ff "origin/${{ github.event.pull_request.base.ref }}"

  CI:
      name: Lint, Format & Test
      runs-on: ubuntu-latest
      timeout-minutes: 15

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Prepare env files
          run: make env-init

        - name: Start required services
          run: make run-dev

        - name: Wait for PostgreSQL
          run: |
            for i in {1..60}; do
              if make compose-dev-command COMMAND='exec -T postgres pg_isready -U ai_assistant' >/dev/null 2>&1; then
                echo "PostgreSQL is ready"
                exit 0
              fi
              echo "Waiting for PostgreSQL..."
              sleep 2
            done
            echo "PostgreSQL did not become ready in time"
            exit 1

        - name: Install dev deps in backend
          run: make compose-dev-command COMMAND='exec -T backend uv sync --frozen --extra dev'

        - name: Run lint
          run: make lint

        - name: Check format
          run: make format-check

        - name: Run tests
          run: make test

        - name: Show containers status on failure
          if: failure()
          run: make compose-dev-command COMMAND='ps'

        - name: Tear down
          if: always()
          run: make down-dev ARGS="-v"
