services:
  postgres:
    ports:
      - "5432:5432"

  qdrant:
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC

  backend:
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload